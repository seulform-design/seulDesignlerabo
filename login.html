<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="르라보 로그인 - 당신의 향기를 관리하세요.">
  <meta name="theme-color" content="#1a2421">
  <meta name="format-detection" content="telephone=no">
  <title>Login | LE LABO · Forest Laboratory</title>
  <link rel="stylesheet" href="./styles/reset.css">
  <link rel="stylesheet" href="./styles/common.css">
  <link rel="stylesheet" href="./styles/index.css">
  <link rel="stylesheet" href="./styles/login.css">
  <link rel="stylesheet" href="./styles/responsive.css">
  <script src="./scripts/layout-system.js" defer></script>
</head>

<body class="page-login">
  <div id="wrap">
    <a href="#main-content" class="skip-nav">본문 바로가기</a>
    <!-- Header & Announcement Bar injected by layout-system.js -->
    <main id="main-content">
      <section class="login-layout" aria-labelledby="login-title">
        <!-- VISUAL SIDE -->
        <aside class="login-visual" aria-hidden="true">
          <div class="login-quote">
            <p class="quote-text">"Quietly the best perfume I own."</p>
            <p class="quote-author">— Hana, Tokyo</p>
          </div>
          <p class="login-visual-tag">BOTANICAL · LAB</p>
        </aside>
        <!-- FORM SIDE -->
        <div class="login-main">
          <div class="login-box">
            <h1 class="login-title" id="login-title">Welcome back</h1>
            <p class="login-subtitle">Sign in to track orders, save scents, and pick up where you left off.</p>
            <form class="login-form" action="index.html">
              <div class="form-group">
                <label class="sr-only" for="login-email">이메일 주소</label>
                <input type="email" id="login-email" class="login-input" placeholder="Email address" autocomplete="email" required />
              </div>
              <div class="form-group">
                <label class="sr-only" for="login-password">비밀번호</label>
                <input type="password" id="login-password" class="login-input" placeholder="Password" autocomplete="current-password" required />
                <a href="login.html" class="forgot-link">Forgot password?</a>
              </div>
              <button type="submit" class="btn btn-primary login-btn">Sign In →</button>
            </form>
            <div class="login-divider">or</div>
            <div class="social-btns">
              <button type="button" class="social-btn">Continue with Apple</button>
              <button type="button" class="social-btn">Continue with Google</button>
            </div>
            <div class="login-footer-links">
              <p>New here? <a href="finder.html">Create an account →</a></p>
              <p class="login-guest-divider">— 또는 계정 없이 —</p>
              <div class="login-guest-links">
                <a href="checkout.html">비회원 주문 조회 →</a>
                <a href="shop.html">비회원으로 구매 →</a>
              </div>
            </div>
            <p class="login-ssl-note">🔒 로그인 정보는 SSL 256bit로 암호화됩니다. 제3자와 공유되지 않습니다.</p>
          </div>
        </div>
      </section>
    </main>
    <!-- Footer injected by layout-system.js -->
  </div>
  <script src="./scripts/global.js"></script>
</body>
</html>
